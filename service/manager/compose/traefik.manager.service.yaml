services:
  traefik:
    image: ${TRAEFIK_IMAGE}
    container_name: ${COMPOSE_PROJECT_PREFIX}-traefik

    restart: ${COMPOSE_RESTART_POLICY}
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=${COMPOSE_NETWORK}
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --log.level=${TRAEFIK_LOG_LEVEL}
      - --accesslog=true
      - --accesslog.filepath=/var/log/traefik/access.log
      # Uncomment to enable Datadog tracing + metrics
      # - --tracing=true
      # - --tracing.datadog=true
      # - --tracing.datadog.localagenthostport=${DD_AGENT_HOST}:8126
      # - --tracing.serviceName=traefik
      # - --metrics.datadog=true
      # - --metrics.datadog.address=${DD_AGENT_HOST}:8125
      # - --metrics.datadog.addentrypointslabels=true
      # - --metrics.datadog.addserviceslabels=true
      # - --metrics.datadog.pushinterval=10s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-letsencrypt:/letsencrypt
      - traefik-logs:/var/log/traefik
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - 80:80
      - 443:443
      - ${TRAEFIK_DASHBOARD_PORT}:8080
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik-dashboard.rule=Host(`${TRAEFIK_DASHBOARD_HOST}`)
      - traefik.http.routers.traefik-dashboard.service=api@internal
      - traefik.http.routers.traefik-dashboard.middlewares=auth
      - traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}

volumes:
  traefik-letsencrypt:
    name: ${COMPOSE_PROJECT_PREFIX}-traefik-letsencrypt
  traefik-logs:
    name: ${COMPOSE_PROJECT_PREFIX}-traefik-logs
